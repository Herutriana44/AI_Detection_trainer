{% extends "base.html" %}
{% block title %}{{ 'Edit' if project else 'Buat' }} Project - YOLO Training{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h4>{{ 'Edit' if project else 'Buat' }} Project</h4>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Nama Project</label>
                        <input type="text" name="name" class="form-control" value="{{ project.name if project else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Deskripsi (opsional)</label>
                        <textarea name="description" class="form-control" rows="3">{{ project.description if project else '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Simpan</button>
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
