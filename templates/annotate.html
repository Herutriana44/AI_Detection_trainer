{% extends "base.html" %}
{% block title %}Anotasi - {{ image.filename }}{% endblock %}
{% block extra_css %}
<style>
    #canvas { cursor: crosshair; display: block; max-width: 100%; }
    .annotation-list { max-height: 300px; overflow-y: auto; }
</style>
{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <div>
        <a href="{{ url_for('upload.dataset', project_id=project.id) }}" class="btn btn-sm btn-outline-secondary mb-2"><i class="bi bi-arrow-left"></i> Kembali</a>
        <h5 class="mb-0">{{ image.filename }}</h5>
    </div>
    <div class="d-flex gap-2">
        <input type="text" id="classInput" class="form-control form-control-sm" placeholder="Nama kelas (Enter)" style="width: 150px;">
        <button id="saveBtn" class="btn btn-primary btn-sm"><i class="bi bi-check-lg"></i> Simpan</button>
    </div>
</div>
<div class="row">
    <div class="col-lg-9">
        <div class="card">
            <div class="card-body p-2 text-center">
                <canvas id="canvas"></canvas>
            </div>
        </div>
    </div>
    <div class="col-lg-3">
        <div class="card">
            <div class="card-header py-2">Kelas & Bounding Box</div>
            <div class="card-body p-2">
                <div id="classList" class="mb-2"></div>
                <div id="annotationList" class="annotation-list small"></div>
            </div>
        </div>
    </div>
</div>
<script>
const projectId = {{ project.id }};
const imageId = {{ image.id }};
const imageUrl = "{{ url_for('upload.serve_image', project_id=project.id, filepath=image.filepath) }}";
const imgWidth = {{ image.width or 640 }};
const imgHeight = {{ image.height or 480 }};
</script>
<script src="{{ url_for('static', filename='annotate.js') }}"></script>
{% endblock %}
